global:
  scrape_interval: 15s
  evaluation_interval: 15s

# rule_files:
#  - /etc/prometheus/rules/alert.rules
#  - /etc/prometheus/rules/recording.rules
#  - /etc/prometheus/rules/containers.rule
#  - /etc/prometheus/rules/node.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [ 'prometheus:9090' ]

  - job_name: core-api
    static_configs:
      - targets: [ 'core-api-service:8000' ]
    scrape_interval: 5s

  - job_name: node
    static_configs:
      - targets: [ 'node-exporter:9100' ]

  - job_name: "cadvisor"
    static_configs:
      - targets: [ "cadvisor:8080" ]

  - job_name: postgres
    static_configs:
      - targets: [ "postgres-exporter:9187" ]

  - job_name: 'redis'
    static_configs:
      - targets: [ 'redis-exporter-service:9121' ]