user nginx;

worker_processes auto;

events {
    worker_connections 1024;

    multi_accept on;
    use epoll;
}

error_log /var/log/nginx/error.log crit;
pid       /var/run/nginx.pid;

http {
    include /etc/nginx/base-nginx.conf;

    #################################
    #           BASE SERVER         #
    #################################

    server {
        listen 80;
        listen [::]:80;


        server_name prostoprobuy-prod.ru
                    api.prostoprobuy-prod.ru
                    admin.prostoprobuy-prod.ru
                    grafana.prostoprobuy-prod.ru;

        # location /.well-known/acme-challenge/ {
        #     root /var/www/certbot;
        # }

        if ($http_user_agent ~* LWP::Simple|BBBike|wget|msnbot|scrapbot) {
            return 403;
        }
        return 301 https://$host$request_uri;
    }

    #################################
    #           BACKEND             #
    #################################

    server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name db-admin.prostoprobuy-dev.ru;
    ssl_certificate /etc/letsencrypt/live/db-admin.prostoprobuy-prod.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/db-admin.prostoprobuy-prod.ru/privkey.pem;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://admin-db-dev:8080/;
    }
}

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name api.prostoprobuy-prod.ru;

        http2 on;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;

        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
        ssl_certificate /etc/letsencrypt/live/api.prostoprobuy-prod.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.prostoprobuy-prod.ru/privkey.pem;

        location /staticfiles/ {
            expires    7d;
            add_header Cache-Control "public, max-age=604800, must-revalidate";
            proxy_pass http://core-api:8000/staticfiles/;
        }

        location / {

            if ($http_origin = "") {
                return 403;
            }
            if ($http_origin !~* "(https://admin.prostoprobuy-prod.ru|https://prostoprobuy-prod.ru)") {
                return 403;
            }

            limit_req  zone=one burst=20 nodelay; # ограничивает частоту запросов (например, защита от DDoS).
            limit_conn addr 20; # ограничивает число одновременных соединений с одного IP-адреса

            proxy_set_header   Upgrade $http_upgrade; # для поддержки WebSocket (передаёт заголовок Upgrade).
            proxy_set_header   Connection "upgrade"; # используется совместно с Upgrade
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for; # передают путь IP клиента.
            proxy_set_header   X-Forwarded-Proto $scheme; # передает протокол.
            proxy_set_header   Host $http_host; # передает начальный IP клиента.
            proxy_set_header   X-Real-IP $remote_addr; # передает реальный IP клиента.
            proxy_cache_bypass $http_upgrade; #  отключает кэш для WebSocket-подключений.
            proxy_http_version 1.1; # используется для WebSocket и keep-alive соединений.
            proxy_redirect     off; # отключает автоматическую подстановку Location-заголовков от backend'а.
            proxy_pass         http://core-api:8000/; #  основной backend-сервер (API-приложение), куда идут все остальные запросы.
        }

        location = /favicon.ico {
            access_log off;
            log_not_found off;
        }
    }

    #################################
    #           ADMIN               #
    #################################

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name admin.prostoprobuy-prod.ru;

        http2 on;

        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
        ssl_certificate /etc/letsencrypt/live/admin.prostoprobuy-prod.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.prostoprobuy-prod.ru/privkey.pem;

        location /_next/static/ {
            proxy_pass http://admin-client:3001/_next/static/;
            expires    7d;
            add_header Cache-Control "public, max-age=604800, must-revalidate";
        }

        location / {
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_cache_bypass $http_upgrade;
            proxy_pass         http://admin-client:3001/;
        }
    }

    #################################
    #           TMA                 #
    #################################

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name prostoprobuy-prod.ru;

        http2 on;

        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
        ssl_certificate /etc/letsencrypt/live/prostoprobuy-prod.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/prostoprobuy-prod.ru/privkey.pem;

        location /_next/static/ {
            proxy_pass http://tma-client:3002/_next/static/;
            expires    7d;
            add_header Cache-Control "public, max-age=604800, must-revalidate";
        }

        location / {
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_cache_bypass $http_upgrade;
            proxy_pass         http://tma-client:3002/;
        }

    }

    #################################
    #           GRAFANA             #
    #################################

     server {
         listen 443 ssl;
         listen [::]:443 ssl;
         server_name grafana.prostoprobuy-prod.ru;

         # if ($whitelist = 0) {
         #    return 403;
         # }

         ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
         ssl_certificate /etc/letsencrypt/live/grafana.prostoprobuy-prod.ru/fullchain.pem;
         ssl_certificate_key /etc/letsencrypt/live/grafana.prostoprobuy-prod.ru/privkey.pem;

         location / {
             proxy_set_header Host $http_host;
             proxy_set_header X-Forwarded-Proto $scheme;
             proxy_set_header X-Real-IP $remote_addr;
             proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
             proxy_pass       http://grafana:3030/;
         }
     }

}