include      /etc/nginx/mime.types;                     # Подключение файла с определением типов MIME
default_type application/octet-stream;                   # Тип по умолчанию, если MIME не определён

types {
    application/manifest+json webmanifest;               # Явное добавление типа webmanifest
}

log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                '$status $body_bytes_sent "$http_referer" '
                '"$http_user_agent" "$http_x_forwarded_for"';       # Формат для логов с именем "main"

# ssl_stapling on;                                      # (Отключено) Включает SSL Stapling (кэширование OCSP)
# ssl_stapling_verify on;                               # (Отключено) Проверка OCSP-ответа

# resolver 127.0.0.1;                                   # (Отключено) DNS-резолвер

open_file_cache max=200000 inactive=20s;                # Кэш открытых файлов (максимум 200000 записей, неактивные 20 сек)
open_file_cache_valid  30s;                             # Обновление кеша каждые 30 сек
open_file_cache_min_uses 2;                             # Файл должен использоваться как минимум 2 раза
open_file_cache_errors  on;                             # Кэшировать ошибки открытия файлов

server_tokens off;                                      # Отключение версии nginx в заголовках

access_log off;                                         # Отключение логирования запросов (полностью)

sendfile    on;                                         # Использовать sendfile для отправки файлов
tcp_nopush  on;                                         # Оптимизация TCP (отправка заголовков и тела вместе)
tcp_nodelay on;                                         # Отправка данных без задержек

gzip              on;                                   # Включение GZIP-сжатия
gzip_vary         on;                                   # Добавление заголовка Vary для кэширования
gzip_min_length  512;                                   # Минимальный размер ответа для сжатия
gzip_comp_level    6;                                   # Уровень сжатия (1-9)
gzip_disable "msie6";                                   # Отключение gzip для IE6
gzip_buffers   16 8k;                                   # Буферы для gzip

gzip_types   text/plain text/css application/json       # MIME-типы, которые будут сжиматься
              application/javascript text/xml
              application/xml application/xml+rss
              text/javascript;
gzip_proxied no-cache no-store private expired auth;    # Сжатие только если прокси-клиенту можно

types_hash_max_size             2048;                   # Размер хеша MIME-типов
types_hash_bucket_size           128;                   # Размер корзины хеша MIME-типов
proxy_headers_hash_max_size     2048;                   # Размер хеша заголовков прокси
proxy_headers_hash_bucket_size   128;                   # Размер корзины хеша заголовков

proxy_buffering                   on;                   # Включение буферизации ответов от прокси
proxy_buffers                  8 16k;                   # Количество и размер буферов
proxy_buffer_size                32k;                   # Размер буфера заголовков от прокси
proxy_busy_buffers_size          64k;                   # Размер буфера для "занятых" данных от прокси

reset_timedout_connection      on;                      # Принудительное завершение соединения при таймауте
client_body_timeout           15s;                      # Таймаут чтения тела запроса
client_header_timeout         15s;                      # Таймаут чтения заголовков
send_timeout                  15s;                      # Таймаут отправки ответа клиенту
proxy_read_timeout            15s;                      # Таймаут чтения ответа от прокси
uwsgi_read_timeout            15s;                      # Таймаут для uwsgi-соединений
keepalive_requests           1000;                      # Количество запросов в keep-alive соединении
keepalive_timeout             75s;                      # Сколько времени держать соединение открытым без активности
client_body_buffer_size       64k;                      # Размер буфера тела запроса
client_header_buffer_size     64k;                      # Размер буфера заголовков
client_max_body_size           2G;                      # Максимальный размер тела запроса
large_client_header_buffers 4 64k;                      # Буферы для больших заголовков
limit_req_zone $binary_remote_addr zone=one:10m rate=20r/s; # Лимит соеденений
limit_conn_zone $binary_remote_addr zone=addr:10m; # лимит запросов

# limit_conn_zone $binary_remote_addr zone=addr:10m;     # (Отключено) Настройка зоны ограничения соединений
# limit_conn addr 10;                                    # (Отключено) Ограничение соединений с одного IP
# limit_req_zone  $binary_remote_addr zone=one:10m rate=10r/s; # (Отключено) Ограничение запросов

include /etc/nginx/conf.d/*.conf;                       # Включение всех .conf файлов в папке conf.d
include /etc/nginx/sites-enabled/*;                     # Включение всех файлов из sites-enabled (обычно сайты)
include /etc/letsencrypt/options-ssl-nginx.conf;        # SSL-настройки от Let's Encrypt

