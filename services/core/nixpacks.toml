[phases.setup]
nixPkgs = ["python312", "ffmpeg"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
# --proxy-headers + --forwarded-allow-ips='*': Railway терминирует TLS снаружи,
# до приложения запрос доходит как http. Без этих флагов request.base_url
# становится http://, и абсолютные ссылки на картинки (/uploads/...) пишутся с
# http → на https-странице браузер блокирует их как mixed content («битые»).
cmd = "python -m alembic upgrade heads && python -m uvicorn main.main_prod:app --host 0.0.0.0 --port ${PORT:-8000} --proxy-headers --forwarded-allow-ips='*'"
