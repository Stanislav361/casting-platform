<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0f" />
    <title>prostoprobuy offline</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at 50% 30%, rgba(245, 197, 24, 0.18), transparent 36%),
          linear-gradient(180deg, #17171b 0%, #09090c 100%);
        color: #fff;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        width: min(420px, 100%);
        padding: 28px 24px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.05);
        text-align: center;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(16px);
      }
      .logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 18px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        background: #f5c518;
        color: #080809;
        font-size: 34px;
        font-weight: 900;
      }
      h1 { margin: 0 0 10px; font-size: 22px; letter-spacing: -0.03em; }
      p { margin: 0; color: rgba(255,255,255,.68); line-height: 1.5; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo">P</div>
      <h1>Нет подключения</h1>
      <p>Проверьте интернет и откройте приложение ещё раз.</p>
    </main>
  </body>
</html>
